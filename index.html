<body>

    <!-- Suite Navigation -->
    <nav class="suite-nav" aria-label="Suite navigation">
        <a href="https://dccn.arose-niazi.me/">← DCCN Suite</a>
    </nav>

    <!-- Header -->
    <header class="site-header">
        <div class="header-inner">
            <h1 class="site-title">Network Error Detection<span>Calculator</span></h1>
            <div class="header-actions">
                <button id="history-toggle-btn" type="button" aria-label="Toggle history panel">History</button>
                <button id="theme-toggle" type="button" aria-label="Toggle dark mode">🌙</button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="primary-area">

            <!-- Input Card -->
            <section class="card" aria-label="Input">
                <h2 class="card-title">Input</h2>

                <!-- Method Selection -->
                <div class="controls-row">
                    <div class="control-group">
                        <label for="method-select">Method</label>
                        <select id="method-select">
                            <option value="crc">CRC (Cyclic Redundancy Check)</option>
                            <option value="checksum">Checksum</option>
                            <option value="hamming">Hamming Code</option>
                        </select>
                    </div>

                    <!-- CRC-specific controls -->
                    <div class="control-group" id="crc-preset-group">
                        <label for="crc-preset">Preset Polynomial</label>
                        <select id="crc-preset">
                            <option value="custom">Custom</option>
                            <option value="1011">CRC-3 (1011)</option>
                            <option value="10011">CRC-4 (10011)</option>
                            <option value="110101">CRC-5 USB (110101)</option>
                            <option value="1100001">CRC-6 (1100001)</option>
                            <option value="100000111">CRC-8 (100000111)</option>
                        </select>
                    </div>

                    <!-- Checksum-specific controls -->
                    <div class="control-group" id="checksum-bits-group" style="display:none">
                        <label for="checksum-bits">Block Size (bits)</label>
                        <select id="checksum-bits">
                            <option value="4">4 bits</option>
                            <option value="8" selected>8 bits</option>
                            <option value="16">16 bits</option>
                        </select>
                    </div>

                    <!-- Hamming-specific controls -->
                    <div class="control-group" id="hamming-mode-group" style="display:none">
                        <label for="hamming-mode">Mode</label>
                        <select id="hamming-mode">
                            <option value="encode">Encode</option>
                            <option value="decode">Decode (Check &amp; Correct)</option>
                        </select>
                    </div>
                </div>

                <!-- Data Input -->
                <div class="input-section">
                    <label for="data-input" class="input-label" id="data-label">Binary Data</label>
                    <input type="text" id="data-input" class="text-input" placeholder="Enter binary data (e.g., 11010011101100)" autocomplete="off" spellcheck="false">
                    <p class="input-hint" id="data-hint">Enter a binary string (0s and 1s only)</p>
                </div>

                <!-- CRC Polynomial Input -->
                <div class="input-section" id="poly-section">
                    <label for="poly-input" class="input-label">Generator Polynomial (Divisor)</label>
                    <input type="text" id="poly-input" class="text-input" placeholder="Enter generator polynomial (e.g., 1011)" autocomplete="off" spellcheck="false">
                    <p class="input-hint">The divisor polynomial in binary. Leading 1 required. Degree = number of CRC bits.</p>
                </div>

                <!-- Action Buttons -->
                <div class="btn-row">
                    <button id="calculate-btn" class="btn btn-primary" type="button">Calculate</button>
                    <button id="random-btn" class="btn btn-secondary" type="button">Random</button>
                    <button id="clear-btn" class="btn btn-secondary" type="button">Clear Output</button>
                </div>

                <p class="tip-text">
                    Tip: Press <kbd>Ctrl+Enter</kbd> to calculate
                </p>
            </section>

            <!-- Output -->
            <section id="output" aria-label="Calculation results"></section>
        </div>

        <!-- History Panel -->
        <aside id="history-panel">
            <div class="card">
                <h2 class="card-title">
                    History
                    <button id="clear-history-btn" class="btn btn-small btn-secondary" type="button">Clear</button>
                </h2>
                <div id="history-list"></div>
            </div>
        </aside>
    </main>

            </nav>
        </div>
